<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – InterviewAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div class="auth-wrap">
    <div class="auth-brand"><a href="/">Interview<span>AI</span></a></div>

    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-sub">Start practicing interviews today — it's free.</p>

      <div id="auth-error" class="auth-alert" style="display:none"></div>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="name" placeholder="John Doe" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="john@email.com" class="form-input"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min 6 characters" class="form-input"/>
      </div>

      <button class="btn-primary btn-full" id="signup-btn" onclick="handleSignup()">
        <span id="signup-text">Create Account →</span>
        <span id="signup-loader" class="loader" style="display:none"></span>
      </button>

      <div class="auth-divider"><span>or</span></div>

      <button class="btn-google" onclick="handleGoogleSignup()">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.5 16.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.5 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.3 26.8 36 24 36c-5.3 0-9.7-3.3-11.3-7.9l-6.5 5C9.5 39.5 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.1-2.1 3.9-3.9 5.2l6.2 5.2C37.3 38.7 44 33.9 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Continue with Google
      </button>

      <p class="auth-link">Already have an account? <a href="/login">Log in</a></p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, signInWithPopup }
      from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAmNVtfCsqYA2GWGdrqXL3s1WG851Gm1Dw",
      authDomain: "ai-interview-simulator-b8b73.firebaseapp.com",
      projectId: "ai-interview-simulator-b8b73",
      storageBucket: "ai-interview-simulator-b8b73.firebasestorage.app",
      messagingSenderId: "622779882759",
      appId: "1:622779882759:web:7c6138258f9a1ad65439a2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.handleSignup = async function() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('auth-error');
      const btn = document.getElementById('signup-btn');
      const loader = document.getElementById('signup-loader');
      const text = document.getElementById('signup-text');

      if (!name || !email || !password) {
        showError('Please fill in all fields.'); return;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters.'); return;
      }

      btn.disabled = true; loader.style.display = 'inline-block'; text.style.display = 'none';

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: name });
        const token = await cred.user.getIdToken();
        localStorage.setItem('interviewai_token', token);
        localStorage.setItem('interviewai_user', JSON.stringify({ name, email, uid: cred.user.uid }));
        window.location.href = '/dashboard';
      } catch (e) {
        btn.disabled = false; loader.style.display = 'none'; text.style.display = 'inline';
        showError(friendlyError(e.code));
      }
    };

    window.handleGoogleSignup = async function() {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const token = await user.getIdToken();
        localStorage.setItem('interviewai_token', token);
        localStorage.setItem('interviewai_user', JSON.stringify({ name: user.displayName, email: user.email, uid: user.uid }));
        window.location.href = '/dashboard';
      } catch (e) {
        showError(friendlyError(e.code));
      }
    };

    function showError(msg) {
      const el = document.getElementById('auth-error');
      el.textContent = msg; el.style.display = 'block';
    }

    function friendlyError(code) {
      const map = {
        'auth/email-already-in-use': 'This email is already registered.',
        'auth/invalid-email': 'Invalid email address.',
        'auth/weak-password': 'Password is too weak.',
        'auth/popup-closed-by-user': 'Google sign-in was cancelled.'
      };
      return map[code] || 'Something went wrong. Please try again.';
    }
  </script>
</body>
</html>
